<div class="dashboard-container">
  
  <aside class="sidebar">
    <nav class="sidebar-nav">
      <a href="#" class="nav-item" [class.active]="menuAtivoLateral === 'home'" (click)="navegarMenuLateral('home', $event)">
        <span class="icon">⊞</span> Home
      </a>
      <a href="#" class="nav-item" [class.active]="menuAtivoLateral === 'tanques'" (click)="navegarMenuLateral('tanques', $event)">
        <span class="icon">📄</span> Tanques
      </a>
      <a href="#" class="nav-item" [class.active]="menuAtivoLateral === 'axolotes'" (click)="navegarMenuLateral('axolotes', $event)">
        <span class="icon">🗺️</span> Axolotes
      </a>
      <a href="#" class="nav-item">
        <span class="icon">👥</span> Registros
      </a>
    </nav>
  </aside>

  <main class="main-area">
    
    <header class="top-header">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Pesquisar..." class="search-input">
      </div>
      <div class="header-icons">
        <button class="icon-btn">🔔</button>
        <button class="icon-btn">⚙️</button>
      </div>
    </header>

    <div class="dashboard-content">
      
      <div *ngIf="menuAtivoLateral === 'home'">
        
        <div class="filter-tabs">
          <button class="tab-btn" [class.active]="abaAtiva === 'ultimo_acesso'" (click)="selecionarAba('ultimo_acesso')">⏱️ Último acesso</button>
          <button class="tab-btn" [class.active]="abaAtiva === 'axolote'" (click)="selecionarAba('axolote')">👤 Axolote</button>
          <button class="tab-btn" [class.active]="abaAtiva === 'aquarios'" (click)="selecionarAba('aquarios')">〰️ Aquários</button>
        </div>

        <section class="disney-carousel" (mouseenter)="pararCarrossel()" (mouseleave)="iniciarCarrossel()">
          
          <button class="carousel-arrow left-arrow" (click)="slideAnterior()">&#10094;</button>
          <button class="carousel-arrow right-arrow" (click)="proximoSlide()">&#10095;</button>

          <div class="carousel-track" [style.transform]="'translateX(-' + (slideAtual * 100) + '%)'">
            <div class="carousel-slide" *ngFor="let item of itensCarrossel">
              <img [src]="item.imagem" [alt]="item.titulo" class="slide-image">
              <div class="slide-overlay">
                <h2>{{ item.titulo }}</h2>
                <p>{{ item.desc }}</p>
              </div>
            </div>
          </div>

          <div class="carousel-dots">
            <div class="dot" *ngFor="let item of itensCarrossel; let i = index" [class.active]="slideAtual === i" (click)="irParaSlide(i)"></div>
          </div>
        </section>

        <section class="bottom-grid">
          <div class="timeline-panel">
            <div class="timeline-item">
              <div class="timeline-content">
                <h4>Mobile app</h4>
                <div class="status-box status-accepted">Aceito</div>
              </div>
            </div>
          </div>

          <div class="alerts-panel">
            <div class="alert-card alert-warning">
              <div class="alert-icon">⚠️</div>
              <div class="alert-text">
                <h4>Attention needed</h4>
                <p>Lorem Ipsum is simply dummy text...</p>
              </div>
            </div>
          </div>
        </section>
      </div>
      <app-tanques *ngIf="menuAtivoLateral === 'tanques'"></app-tanques>

      <app-axolotes *ngIf="menuAtivoLateral === 'axolotes'"></app-axolotes>

    </div> </main> </div> ```
